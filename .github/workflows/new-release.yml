name: New IDaaS Release Check
on:
  schedule:
    - cron: 0 21 * * *
  workflow_dispatch: {}
permissions:
  contents: write
  pull-requests: write
jobs:
  update:
    name: IDaaS Auth API Update Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      - run: bun install --frozen-lockfile
      - run: bun run download
      - name: Extract API version
        id: version
        run: echo "api_version=$(jq -r '.info.version' openapi/authentication.json)" >> $GITHUB_OUTPUT
      - uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          title: "chore: update IDaaS API to v${{ steps.version.outputs.api_version }}"
          commit-message: "chore: update IDaaS API to v${{ steps.version.outputs.api_version }}"
          assignees: maccuaa
